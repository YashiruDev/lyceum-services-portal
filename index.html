<!DOCTYPE html>
<html>
<head>
    <title>Lyceum Portal</title>
    <style>
        body {
            background: linear-gradient(rgba(0,51,102,0.7), rgba(0,51,102,0.7)), 
                        url('https://images.unsplash.com/photo-1541339907198-e08756ebafe3?q=80&w=2070');
            background-size: cover;
            font-family: sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3);
            text-align: center; color: white; width: 350px;
        }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { background: #003366; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="glass">
        <img src="https://www.lyceum.lk/images/logo.png" style="width:100px;">
        <h2>Lyceum Portal</h2>
        <div id="login">
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button onclick="document.getElementById('login').style.display='none'; document.getElementById('services').style.display='block';">Login</button>
        </div>
        <div id="services" style="display:none;">
            <h3>Student Services</h3>
            <button onclick="alert('Request sent to IT Dept')">Microsoft Email Reset</button>
            <p style="font-size:12px; margin-top:20px;">Staff Services (Coming Soon)</p>
        </div>
    </div>
</body>
</html>
