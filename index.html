<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyceum Next-Gen Portal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #002b5c;
            --accent: #00d2ff;
            --glass: rgba(255, 255, 255, 0.12);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0a url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center;
            color: white;
        }

        /* Advanced UI Container */
        .container {
            width: 900px; height: 550px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            display: flex; overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Left Side - Branding */
        .brand-side {
            width: 40%; background: rgba(0, 43, 92, 0.6);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 40px;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .brand-side img { width: 120px; margin-bottom: 20px; }

        /* Right Side - Form area */
        .form-side { width: 60%; padding: 50px; position: relative; overflow-y: auto; }

        h2 { font-weight: 700; font-size: 28px; margin-bottom: 10px; color: var(--accent); }
        p.subtitle { font-size: 14px; opacity: 0.7; margin-bottom: 30px; }

        .input-group { margin-bottom: 15px; }
        input, select {
            width: 100%; padding: 14px; margin-top: 5px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }

        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 12px;
            font-weight: 700; cursor: pointer; transition: 0.4s; margin-top: 20px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-primary { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,210,255,0.3); }

        .link-text { margin-top: 20px; font-size: 13px; cursor: pointer; color: var(--accent); }

        /* Dashboard Styles */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .card {
            background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s;
            text-align: center;
        }
        .card i { font-size: 30px; margin-bottom: 15px; color: var(--accent); }
        .card:hover { background: rgba(255,255,255,0.15); transform: translateY(-5px); }
        .disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }

        .view { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-side">
            <img src="https://www.lyceum.lk/images/logo.png" alt="Logo">
            <h3>LYCEUM</h3>
            <p style="font-size: 12px; letter-spacing: 2px;">DIGITAL ECOSYSTEM</p>
        </div>

        <div class="form-side">
            <div id="loginView" class="view active">
                <h2>Welcome Back</h2>
                <p class="subtitle">Enter your Lyceum credentials to continue</p>
                <div class="input-group">
                    <input type="text" id="logUser" placeholder="Username (First Name)">
                </div>
                <div class="input-group">
                    <input type="password" id="logPass" placeholder="Password (Phone/EPF)">
                </div>
                <button class="btn btn-primary" onclick="login()">Sign In</button>
                <p class="link-text" onclick="showView('signupView')">New here? Create an Account</p>
            </div>

            <div id="signupView" class="view">
                <h2>Create Account</h2>
                <select id="userType" onchange="toggleSignupFields()">
                    <option value="parent">Parent</option>
                    <option value="staff">Staff Member</option>
                </select>
                <div id="fields" style="margin-top: 20px;">
                    <input type="text" id="regFullName" placeholder="Full Name">
                    <div id="parentFields">
                        <input type="text" id="regAdm" placeholder="Student Admission Number">
                        <input type="text" id="regPhone" placeholder="Contact Number">
                    </div>
                    <div id="staffFields" style="display:none;">
                        <input type="text" id="regEpf" placeholder="EPF Number">
                    </div>
                </div>
                <button class="btn btn-primary" onclick="signup()">Create Profile</button>
                <p class="link-text" onclick="showView('loginView')">Back to Login</p>
            </div>

            <div id="dashboardView" class="view">
                <h2>Services Portal</h2>
                <p class="subtitle" id="welcomeMsg"></p>
                <div class="dashboard-grid">
                    <div class="card" onclick="openReset()">
                        <i class="fas fa-key"></i>
                        <h4>MS Password Reset</h4>
                    </div>
                    <div class="card disabled">
                        <i class="fas fa-headset"></i>
                        <h4>Helpdesk Support</h4>
                    </div>
                </div>
                <button class="btn" style="background:none; color:white; border:1px solid rgba(255,255,255,0.3)" onclick="location.reload()">Logout</button>
            </div>
        </div>
    </div>

    <script>
        // Storage Logic
        let users = JSON.parse(localStorage.getItem('lyceum_users')) || [];

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function toggleSignupFields() {
            const type = document.getElementById('userType').value;
            document.getElementById('parentFields').style.display = type === 'parent' ? 'block' : 'none';
            document.getElementById('staffFields').style.display = type === 'staff' ? 'block' : 'none';
        }

        function signup() {
            const type = document.getElementById('userType').value;
            const fullName = document.getElementById('regFullName').value;
            const firstName = fullName.split(' ')[0];
            
            let newUser = { type, fullName, username: firstName };

            if(type === 'parent') {
                newUser.password = document.getElementById('regPhone').value;
                newUser.idNo = document.getElementById('regAdm').value;
            } else {
                newUser.password = document.getElementById('regEpf').value;
                newUser.idNo = document.getElementById('regEpf').value;
            }

            users.push(newUser);
            localStorage.setItem('lyceum_users', JSON.stringify(users));
            alert(`Profile Created! \nUsername: ${newUser.username} \nPassword: ${newUser.password}`);
            showView('loginView');
        }

        function login() {
            const u = document.getElementById('logUser').value;
            const p = document.getElementById('logPass').value;
            const user = users.find(x => x.username === u && x.password === p);

            if(user) {
                window.currentUser = user;
                document.getElementById('welcomeMsg').innerText = `Logged in as: ${user.fullName} (${user.type.toUpperCase()})`;
                showView('dashboardView');
            } else {
                alert("Invalid Credentials");
            }
        }

        function openReset() {
            const idLabel = window.currentUser.type === 'parent' ? "Admission Number" : "EPF Number";
            const input = prompt(`Enter your ${idLabel} to confirm reset:`);
            if(input === window.currentUser.idNo) {
                alert("Request Sent! Microsoft Password will be reset within 1 hour.");
            } else {
                alert("ID Number mismatch. Reset denied.");
            }
        }
    </script>
</body>
</html>
