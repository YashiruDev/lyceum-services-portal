<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyceum Services Portal</title>
    <style>
        :root {
            --lyceum-blue: #003366;
            --lyceum-silver: #f4f4f4;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0,51,102,0.8), rgba(0,51,102,0.8)), 
                        url('https://images.unsplash.com/photo-1523050853063-880c69343f5b?q=80&w=2000');
            background-size: cover;
            background-position: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 380px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            color: white;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo { width: 120px; margin-bottom: 10px; }
        h2 { font-weight: 300; margin-bottom: 25px; letter-spacing: 1px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 12px; margin-left: 5px; opacity: 0.8; }
        
        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
            border: none;
            background: #ffffff;
            color: var(--lyceum-blue);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--lyceum-blue);
            color: white;
            transform: scale(1.02);
        }

        #serviceSection { display: none; }
        .service-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid white; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="glass-card" id="portalCard">
        <img src="https://www.lyceum.lk/images/logo.png" alt="Lyceum" class="logo">
        <h2 id="title">PARENT PORTAL</h2>

        <div id="loginSection">
            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" id="username" placeholder="Enter Username">
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="Enter Password">
            </div>
            <button onclick="handleLogin()">AUTHENTICATE</button>
        </div>

        <div id="serviceSection">
            <p>Welcome back, Lyceum Parent</p>
            <hr style="opacity:0.2">
            <h3>Student Services</h3>
            <button class="service-btn" onclick="requestReset()">Microsoft Email Reset</button>
            <button class="service-btn" onclick="alert('Stage 2 Feature')">Student Progress</button>
            <p style="font-size: 10px; margin-top: 20px; opacity: 0.6;">STAFF SERVICES: RESTRICTED</p>
        </div>
    </div>

    <script>
        // HARDCODED USERS (No App Script Needed)
        const USERS = [
            { user: "parent01", pass: "lyceum123", role: "parent" },
            { user: "admin", pass: "admin789", role: "staff" }
        ];

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            // Simple verification logic
            const foundUser = USERS.find(item => item.user === u && item.pass === p);

            if (foundUser) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('serviceSection').style.display = 'block';
                document.getElementById('title').innerText = "SERVICES DASHBOARD";
            } else {
                alert("Incorrect Credentials. Please contact Lyceum IT.");
            }
        }

        function requestReset() {
            const stuEmail = prompt("Enter the Student's Microsoft Email:");
            if (stuEmail) {
                alert("Request for " + stuEmail + " has been logged. Our IT team will process this shortly.");
            }
        }
    </script>
</body>
</html>
